services:
  api:
    build:
      context: .
      dockerfile: api/etc/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      
  bot:
    build:
      context: .
      dockerfile: bot/etc/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:17-alpine
    volumes:
      - db:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 2s
      timeout: 1s
    restart: unless-stopped
    networks:
      - backend

  migrations:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared/db/migrations:/app/shared/db/migrations
    networks:
      - backend
    restart: "no"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - backend

volumes:
  db:
  redis_data:

networks:
  backend:
    driver: bridge
